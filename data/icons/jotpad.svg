<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#313244"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect x="4" y="4" width="120" height="120" rx="20" ry="20" fill="url(#bg)"/>
  <!-- Notepad lines -->
  <line x1="32" y1="40" x2="96" y2="40" stroke="#585b70" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="56" x2="88" y2="56" stroke="#585b70" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="72" x2="78" y2="72" stroke="#585b70" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="32" y1="88" x2="64" y2="88" stroke="#585b70" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Cursor / accent mark -->
  <rect x="32" y="34" width="3" height="16" rx="1.5" fill="#89b4fa"/>
</svg>
